    .logo-GATOTKACA123 {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  position: relative;
  cursor: pointer;
  /* Isolate stacking context agar filter tidak bocor */
  isolation: isolate;
}

/* ── Elemen gambar logo ────────────────────────────────── */
.logo-GATOTKACA123__img {
  display: block;
  width: auto;
  height: 30px;          /* ubah sesuai kebutuhan */
  max-width: 100%;
  position: relative;
  z-index: 2;

  /* ①  ENTRANCE — muncul dari bawah + fade */
  animation:
    logo-entrance   0.7s  cubic-bezier(0.22, 1, 0.36, 1) both,
    logo-float      4s    ease-in-out                     2s infinite,
    logo-shimmer    6s    ease-in-out                     1s infinite;

  /* Pastikan transform-origin di tengah */
  transform-origin: center center;
  will-change: transform, filter;
}

/* ② ENTRANCE: slide-up + fade-in */
@keyframes logo-entrance {
  0% {
    opacity: 0;
    transform: translateY(18px) scale(0.94);
    filter: brightness(0.5) blur(4px);
  }
  60% {
    opacity: 1;
    filter: brightness(1.15) blur(0px);
  }
  100% {
    opacity: 1;
    transform: translateY(0px) scale(1);
    filter: brightness(1) blur(0px);
  }
}

/* ③ FLOAT: gentle levitate — kesan ringan dan hidup */
@keyframes logo-float {
  0%   { transform: translateY(0px)   scale(1);    }
  30%  { transform: translateY(-5px)  scale(1.012); }
  60%  { transform: translateY(-3px)  scale(1.008); }
  100% { transform: translateY(0px)   scale(1);    }
}

/* ④ SHIMMER: efek cahaya lewat logo (filter brightness pulse) */
@keyframes logo-shimmer {
  0%   { filter: brightness(1)    drop-shadow(0 0  0px  rgba(255, 145, 0, 0));   }
  25%  { filter: brightness(1.12) drop-shadow(0 0  8px  rgba(255, 132, 0, 0.35)); }
  50%  { filter: brightness(1)    drop-shadow(0 0  0px  rgba(255, 123, 0, 0));   }
  75%  { filter: brightness(1.08) drop-shadow(0 0  6px  rgba(255, 128, 30, 0.25)); }
  100% { filter: brightness(1)    drop-shadow(0 0  0px  rgba(255, 153, 0, 0));   }
}

/* ── HOVER state: burst + pulse ───────────────────────── */
.logo-GATOTKACA123:hover .logo-GATOTKACA123__img {
  /* Override float dengan hover animation */
  animation:
    logo-hover-burst 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both,
    logo-hover-glow  1.2s ease-in-out 0.3s infinite;
}

@keyframes logo-hover-burst {
  0%   { transform: scale(1);    filter: brightness(1); }
  40%  { transform: scale(1.06); filter: brightness(1.25) drop-shadow(0 0 12px rgba(255, 140, 0, 0.6)); }
  100% { transform: scale(1.03); filter: brightness(1.1)  drop-shadow(0 0  8px rgba(255, 157, 0, 0.4)); }
}

@keyframes logo-hover-glow {
  0%   { filter: brightness(1.1)  drop-shadow(0 0  8px rgba(255, 102, 0, 0.4)); }
  50%  { filter: brightness(1.2)  drop-shadow(0 0 16px rgba(255, 153, 0, 0.65)); }
  100% { filter: brightness(1.1)  drop-shadow(0 0  8px rgba(255, 81, 0, 0.4)); }
}

/* ── Halo cincin di belakang logo (dekoratif) ──────────── */
.logo-GATOTKACA123::before {
  content: '';
  position: absolute;
  inset: -12px;
  border-radius: 50%;
  background: conic-gradient(
    from 0deg,
    rgba(255,120,0,0.18),
    rgba(255,180,0,0.08),
    rgba(255,120,0,0.18)
  );
  z-index: 1;
  opacity: 0;
  transform: scale(0.6) rotate(0deg);
  animation: logo-halo 4s ease-in-out 0.8s infinite;
  border-radius: 999px;
  width: 110%;
  height: 160%;
  inset: auto;
  top: 50%;
  left: 50%;
  translate: -50% -50%;
  pointer-events: none;
  filter: blur(8px);
}

@keyframes logo-halo {
  0%   { opacity: 0;    transform: scale(0.85) rotate(0deg);   }
  30%  { opacity: 0.7;  transform: scale(1.02) rotate(120deg); }
  60%  { opacity: 0.4;  transform: scale(0.98) rotate(240deg); }
  100% { opacity: 0;    transform: scale(0.85) rotate(360deg); }
}

/* Hover: halo menyala penuh */
.logo-GATOTKACA123:hover::before {
  animation: logo-halo-hover 1.5s ease-in-out infinite;
}

@keyframes logo-halo-hover {
  0%   { opacity: 0.5; transform: scale(0.95) rotate(0deg);   }
  50%  { opacity: 0.9; transform: scale(1.05) rotate(180deg); }
  100% { opacity: 0.5; transform: scale(0.95) rotate(360deg); }
}

/* ── Partikel kilau (CSS-only, 3 titik) ────────────────── */
.logo-GATOTKACA123__spark {
  position: absolute;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: radial-gradient(circle, #ff9244, #ff9100);
  pointer-events: none;
  opacity: 0;
  z-index: 3;
}

.logo-GATOTKACA123__spark:nth-child(1) {
  top: 8%;  left: 18%;
  animation: spark-float 3.5s ease-in-out 1.2s infinite;
}
.logo-GATOTKACA123__spark:nth-child(2) {
  top: 20%; right: 20%;
  width: 4px; height: 4px;
  animation: spark-float 4s ease-in-out 2s infinite;
}
.logo-GATOTKACA123__spark:nth-child(3) {
  bottom: 12%; left: 50%;
  width: 3px; height: 3px;
  animation: spark-float 2.8s ease-in-out 0.5s infinite;
}

@keyframes spark-float {
  0%   { opacity: 0;   transform: translateY(0)   scale(0); }
  20%  { opacity: 0.9; transform: translateY(-8px) scale(1.2); }
  50%  { opacity: 0.5; transform: translateY(-16px) scale(0.8); }
  100% { opacity: 0;   transform: translateY(-26px) scale(0); }
}

/* ── Dark mode support ─────────────────────────────────── */
@media (prefers-color-scheme: dark) {
  .logo-GATOTKACA123__img {
    filter: brightness(1.05);
  }
}
